<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 목록 앱</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        #status {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        #status.loading {
            background-color: #e3f2fd;
            color: #1565c0;
        }
        #status.error {
            background: #ffebee;
            color: #c62828;
        }
        #status.hidden {
            display: none;
        }
        .user-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .user-card h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1rem;
        }
        .user-card p {
            margin: 0;
            color: #666;
            font-size: 0.875rem;
        }

    </style>
</head>
<body>
    <h1>연락처 목록</h1>
    <!-- 로딩/에러 상태 표시 영역 -->
    <div id="status" class="loading">데이터 불러오는 중......</div>

    <!-- 연락처 목록 표시 영역 -->
    <div id="user-list"></div>
    <script>
        const statusEl = document.getElementById('status');
        const userListEl = document.getElementById('user-list')

        // 로딩 상태 표시 함수
        function showLoading(){
            statusEl.textContent='데이터를 불러오는 중...';
            statusEl.className='loading';
        }
        // 오류 상태 표시 함수
        function showError(message){
            statusEl.textContent = `오류 : ${message}`;
            statusEl.className='error';
        }
        // 상태 숨기기 함수
        function hideStatus(){
            statusEl.className='hidden';
        }

        // 연락처 카드 DOM 생성 함수
        function createUserCard(user){ // user : 한 명의 연락처 정보 데이터
            // card box : div
            const card = document.createElement('div');
            card.className='user-card';
            // name
            const name = document.createElement('h3');
            name.textContent=user.name;
            const email = document.createElement('p');
            email.textContent=user.email;
            const company = document.createElement('p');
            company.textContent=user.company.name;

            card.append(name, email, company);
            return card;
        }
        // 데이터 로딩하는 함수
        async function loadUsers(){
            showLoading();
            try{
                const response = await fetch(
                    'https://jsonplaceholder.typicode.com/users'
                );
                if(!response.ok){
                    throw new Error(`서버 에러 (${response.status})`); // message : `서버 에러 (${response.status})`
                }
                // 여기가 실행된다는 뜻은 데이터가 정상적으로 왔다는 의미
                const users = await response.json(); // 파싱
                const fragment = document.createDocumentFragment();
                users.forEach((user) => {
                    fragment.appendChild(createUserCard(user));
                });
                userListEl.appendChild(fragment);
                hideStatus();
            } catch(error){
                showError(error.message);
            }
        }
        loadUsers();
    </script>
</body>
</html>
