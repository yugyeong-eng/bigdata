<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소 생성과 삭제</title>
    <style>
        #book-list {
            list-style: none;
            padding: 0;
        }
        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>내 독서 목록</h2>
    <ul id="book-list"></ul>
    <script>
        // 데이터 : 서버에서 넘어온 데이터라고 가정
        const books = ['데미안', '모비딕', '폭풍의 언덕'];
        const booklist = document.querySelector('#book-list')

        // 최적화
        const fragment = document.createDocumentFragment();

        books.forEach((title)=>{
            // 새 li 생성
            const li = document.createElement('li');
            li.classList.add('book-item'); // style .bookitem{} 적용
            const titleSpan = document.createElement('span'); // span 생성
            titleSpan.textContent = title; // span title
            // 삭제 버튼 생성
            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn'); // 'delete-btn' class 추가
            deleteBtn.textContent='삭제';
            // 삭제 버튼 클릭 시 해당 li 를 제거
            deleteBtn.addEventListener('click', () => {
                li.remove();
            })
            // 자식 요소들을 li에 추가
            li.append(titleSpan, deleteBtn);

            // booklist.append(li); X
            // 위 코드가 안 되는 이유는 한 번에 올리는 것이 아닌 여러 번을 걸쳐서 올려
            // 화면이 흔들릴 수 있는 위험 요소가 있기 때문에 아래 코드처럼
            // (fragment) 사용을 권장한다.
            fragment.append(li);
        });
        booklist.append(fragment);
    </script>
</body>
</html>
