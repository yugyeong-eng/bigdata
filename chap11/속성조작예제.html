<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속성 조작 예제</title>
</head>
<body>
    <a id="link" href="https://example.com">예시링크</a>
    <img id="avatar" src="avata.jpg">
    <script>
        const link = document.querySelector('#link');
        const img = document.querySelector('#avatar');
        // GetAttribute()로 속성값을 읽기
        console.log(link.getAttribute('href'));
        // setAttribute() 속성값 변경
        img.setAttribute('src', 'v.jpg')
    </script>
</body>
</html>
