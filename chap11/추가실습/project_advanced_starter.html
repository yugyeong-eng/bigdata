    <style>
           * { box-sizing: border-box; }
        body {

            padding: 0 20px;
            color: #2c3e50;

        h1 {

            background: white;

        /* 입력 영역 */
        #input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        #todo-input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        #todo-input:focus {
            border-color: #3498db;
            outline: none;
        }
        #add-btn {
            padding: 10px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #add-btn:hover { background: #2980b9; }
 
        /* 할 일 목록 */
        #todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            transition: background 0.15s;
        }
        .todo-item:hover { background: #f5f5f5; }
        .todo-item.done { background: #f9f9f9; }
        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #aaa;
        }
        .todo-text { flex: 1; font-size: 1rem; }
        .complete-btn, .delete-btn {
            padding: 5px 11px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
        }
        .complete-btn { background: #2ecc71; }
        .complete-btn:hover { background: #27ae60; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        /* 카운터 */
        #counter {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #95a5a6;
            text-align: right;
        }
        #empty-msg {
            text-align: center;
            color: #bdc3c7;
            padding: 24px;
            font-size: 0.95rem;
        }
  </style>
</head>
