<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 시세 대시보드</title>
    <style>
        body {font-family: sans-serif; max-width: 560px; margin: 40px auto;}
        table {width: 100%; border-collapse: collapse;}
        th, td {padding: 10px 12px; text-align: right; border-bottom: 1px solid #eee;}
        th:first-child, td:first-child {text-align: left;}
        /* 등락에 따라 색을 다르게 (한국 관습 : 상승=빨강, 하락=파랑) */
        tr.up td:nth-child(3), tr.up td:nth-child(4) {color: #d60000;}
        tr.down td:nth-child(3), tr.down td:nth-child(4) {color: #0047ab;}
        tr.flat td:nth-child(3), tr.flat td:nth-child(4) {color: #777;}
        #summary {margin-top: 12px; font-weight: bold;}
    </style>
</head>
<body>
    <h2>관심 종목 시세</h2>
    <table>
        <thead>
            <tr><th>종목</th><th>현재가</th><th>등락</th><th>등락률</th></tr>
        </thead>
        <tbody id="quote-body"></tbody>
    </table>
    <p id="summary"></p>
    <script>
        // 상태 : 시세 배열
        // 실무 : 이 배열을 websocket(실시간) 수신 데이터로 갱신한다.
        let quotes = [
            {code:"005930", name:"삼성전자", price:71000, prev:70500},
            {code:"000660", name:"하이닉스", price:178000, prev:180000},
            {code:"035420", name:"네이버", price:205000, prev:205000},
        ];
        // 필요한 변수 선언
        const tbody = document.querySelector('#quote-body');
        const summaryEl = document.querySelector('#summary');
        const formatKRW = (n) => n.toLocaleString("ko-KR") + "원";

        // 데이터 보고 표 전체를 다시 그린다 : 반복해서 그린다
        function renderQuotes(){
            tbody.innerHTML = "" // 기존 행을 비우기
            // 임시 컨테이너(담을 곳) 생성(Fragment)
            const fragment = document.createDocumentFragment();
            quotes.forEach((q) => { // q : 한 종목 데이터, {code:"005930", name:"삼성전자", price:71000, prev:70500}
                const diff = q.price - q.prev // 일봉, 전일가 등락액
                const rate = ((diff/q.prev) * 100).toFixed(2); // toFixed(2) 소수점 2자리
                const tr = document.createElement("tr"); // 새로운 행 생성
                tr.dataset.code=q.code; // 행에 종목 코드를 심어 식별 가능하게 함 data-code
                // 색을 직접 쓰지 않고 "상태 클레스" 만 부여 -> 실제 색은 CSS 가 결정
                if(diff>0) tr.classList.add("up"); // 상승행
                else if(diff<0) tr.classList.add("down"); // 하락행
                else tr.classList.add("flat");
                // 등락 기호
                const sign = diff > 0 ? "▲" : diff < 0 ? "▼" : "-";
                const cells = [                             // 한 행에 들어갈 4개 칸 텍스트
                    q.name,                                 // 종목명
                    formatKRW(q.price),                     // 현재가
                    `${sign} ${formatKRW(Math.abs(diff))}`, // 등락액
                    `${rate}%`,                             // 등락률
                ];
                // td 4개 생성
                cells.forEach((text) => {
                    const td = document.createElement("td");
                    td.textContent=text;
                    tr.append(td);
                }); // tr 하나 생성, 3개 종목
                fragment.append(tr); // 임시 저장
            }); // forEach() end
            tbody.append(fragment); // 한 번에 3개 행을 추가
            // summary 처리
            const up = quotes.filter((q) => q.price > q.prev).length; // 상승 종목 수
            const down = quotes.filter((q) => q.price < q.prev).length // 하락 종목 수
            summaryEl.textContent = `상승 : ${up} / 하락 : ${down} / 보합 : ${quotes.length-up-down}`;
        }
    renderQuotes();
    </script>
</body>
</html>
