<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>폼 유효성 검사</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; }
    .field { margin-bottom: 14px; display: flex; flex-direction: column; gap: 4px; }
    input { padding: 9px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    input.invalid { border-color: #e74c3c; background: #fff5f5; }  /* 에러 시 빨간 테두리, invalid은 현재 사용중이라는 의미 (글자 입력) */
    .error { color: #e74c3c; font-size: 0.82rem; min-height: 1em; }
    button { padding: 10px; width: 100%; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #form-status { margin-top: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>회원가입</h2>
  <form id="signup-form" novalidate>
    <div class="field">
      <input name="email" placeholder="이메일" />
      <span class="error" data-for="email"></span> <!-- data- 의 의미는 dataset 을 쓰겠다는 의미 -->
    </div>
    <div class="field">
      <input name="password" type="password" placeholder="비밀번호 (8자 이상)" />
      <span class="error" data-for="password"></span>
    </div>
    <button type="submit">가입하기</button>
  </form>
  <p id="form-status"></p>
  <script>
    // 폼(form), 제출결과(p) 변수 선언
    const form = document.querySelector("#signup-form");
    const statusEl = document.querySelector("#form-status");

    // 검증 규칙을 별도 관리
    // [검증규칙] 필드명 -> {검사함수, 에러메세지}
    const rules = {
        email:{
            // 정규식 : @와 .이 있고 공백이 없으면 통과
            test:(value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value),
            message:"올바른 이메일 형식이 아닙니다.",
        },
        password:{ // 8자 이상이면 통과
            test:(value) => value.length >= 8, // 8자 이상이면 true, false
            message: "비밀번호는 8자 이상",
        }
    }

    // 사용자가 입력한 값을 검증, 통과하면 True
    function validateField(field){
        const rule = rules[field.name] // field.name email, password
        if(!rule) return true; // 검증 안 하는 필드면 그냥 true 줄게
        const valid = rule.test(field.value); // field.value : 사용자가 입력한 값
        // 이 필드에 대응하는 에러 표시 칸을 data-for 속성으로 찾는다
        const errorEl = form.querySelector(`.error[data-for="${field.name}"]`);
        if(valid){ // true : 정상입력, 빨간색 지정 안 되게 하고 에러 메세지가 없어야 함
            field.classList.remove("invalid"); // 빨간 테두리 제거
            errorEl.textContent = "";
        }else{
            field.classList.add("invalid");
            errorEl.textContent = rule.message;
        }
        return valid;
    }

    // 사용자가 입력할 때 발생하는 이벤트 : input
    // [이벤트 위임] 
    form.addEventListener("input", (event) => {
        // 입력 요소에서 난 이벤트만 검증할게 : event.target.matches("input") 
        if (event.target.matches("input")) validateField(event.target);
    });
    // [제출] 기본 동작을 막고 전체 검증, 새로고침 했을 때 제출을 막는다
    form.addEventListener("submit", (event) => {
        event.preventDefault(); // preventDefault 이게 없으면 제출이 되고 새로 고침이 일어남
        const fields = form.querySelectorAll("input"); // 이렇게 하면 2개 들어가있는 배열을 가져오게 된다
        let allValid = true;
        fields.forEach((field) => {
            if(!validateField(field)) allValid = false; // 하나라도 실패하면 False를 줘라
        });
        if(allValid){
            statusE1.textContent="가입 요청 전송 완료";
            // 실무에 이 자리에서는 fetch()로 서버에 실질적으로 전송을 해야 되는데
            // 서버가 없으니 지금은 필요없음
        }else{
            statusE1.textContent="입력값을 확인해주세요";
        }
    });
  </script>


</body>
</html>
