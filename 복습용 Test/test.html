<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트용 HTMl</title>
    <style>
        .korean-jm {
            display: inline;
            vertical-align: middle;
            background-color: #83e5ff;
        }
        .korean-jm {
            font-size: 30px;
            font-weight: 30px;
            background-color: #53f5ef;
            margin: 16px;
            padding: 10px;
            border: 2px solid #f3e5;
            border-radius: 14px;
            
        }
        .abcd {
            display: block;
            background-color: #83e5ff;
        }
    </style>
</head>
<body>
    <div class="title">한글은 위대합니다.
        <div class="kkk korean-jm">자음</div>
        <div class="kkk korean-jm">모음</div>
        <p>자음과 모음에 대한 설명입니다.</p>
    </div>
    <button class="append">추가</button>

    <a class="title">식재료</a>
        <span class="abcd aaaa">오이</span>
        <span class="abcd bbbb">청경채</span>
        <span class="abcd cccc">당근</span>
</body>
</html>
